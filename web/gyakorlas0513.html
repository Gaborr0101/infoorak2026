<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


    <style>
        .valaszjelolo
        {
            height: 25px;
            width: 25px;
            box-sizing: content-box;
        }
    </style>


</head>
<body onload="betolt()">
    <div class="container">
        <div class="row">
            <header class="col-12"><h1 class="text-center">Tesztverseny</h1></header>
        </div>
        <div class="row">
            <div class="col-6">
                <h2 class="text-primary ">2.Feladat:</h2>
                <p>A vetélkedőn <span class="text-success fw-bold" id="f2"></span> versenyző indult.</p>
            </div>
            <div class="col-6">
                <h2 class="text-primary">3-4.Feladat:</h2>
                <label for="f3">A versenyző azonosítója: </label>
                <input type="text" class="form-control" value="AB123" id="azonosito">
                <div class="text-center p-3 "><button onclick="f3()" class="btn btn-info">lekérés</button></div>
                <h3>A versenyző válaszai:</h3>
                <div id="eredmeny" class="border"></div>
                <h3>A helyes megoldás:</h3>
                <div id="helyes" class="border"></div>
            </div>
             <div class="col-6">
                <h2 class="text-primary">5.Feladat:</h2>
                <label for="f3">A feladat sorszáma: </label>
                <input type="number" min="1" max="14" value="10" class="form-control" id="feladatsorszam">
                <div class="text-center p-3 "><button onclick="f5()" class="btn btn-info">lekérés</button></div>
                <h3>A versenyző válaszai:</h3>
                <div id="eredmeny5" class="border">
                    <p>A feladatra <span id="helyesfo"></span> fő, a versenyzők <span id="szazalek"></span>%-a adott helyes választ. </p>
                </div>
            </div>
             <div class="col-6">
                <h2 class="text-primary">6.Feladat:</h2>
                <div class="text-center fw-bold p-4">A versenyzők pontszámának meghatározása: <br><span id="kiir"></span></div>
                 <div style="max-height: 200px; overflow-y: scroll;">
                <ul id="eredmenyLista"></ul>
                </div>
                <div class="text-center p-3 "><button onclick="f6()" id="kiir" class="btn btn-info">kiiratás</button></div>
            </div>
        </div>
        
    </div>

    <script>
        let adatok=[];
        let helyesvalasz="";
        function betolt()
        {

            fetch("valaszok.txt")
            .then(x=>x.text())
            .then(y=>{

                adatok=y.replaceAll("\r","").trim().split("\n");
                helyesvalasz=adatok.shift();
                //console.log(adatok);

                adatok=adatok.map(x=>{

                    const vag =x.split(" ");
                    return{kod:vag[0],valaszok:vag[1]}

                })
                console.log(adatok);
                f2()

            })
            
        }


        function f2()
        {
            let eredmeny=adatok.length
            document.getElementById("f2").innerHTML=eredmeny;
        }
        
        function f3()
        {
            //console.log("hallo")

            const kod=document.getElementById("azonosito").value.toUpperCase();
            let versenyzoadat = adatok.filter(x=>x.kod==kod);
            console.log(versenyzoadat)

            if(versenyzoadat.length==0)
            {
                alert("nem érvényes kód")
                document.getElementById("azonosito").value="";
                return;
            }
            document.getElementById("eredmeny").innerHTML = "" 
            document.getElementById("eredmeny").appendChild(valaszmegjelenit(versenyzoadat[0].valaszok,true));

            document.getElementById("helyes").innerHTML = "" 
            document.getElementById("helyes").appendChild(valaszmegjelenit(helyesvalasz));


        }
        
        function valaszmegjelenit(valaszok,javitaskell=false)
        {



            let gyujto=document.createElement("div");
            console.log(valaszok);

            valaszok.split("").forEach((e,index) => {
               let elem = document.createElement("div");
               elem.classList.add("valaszjelolo");
               elem.classList.add("d-inline-block");
               elem.classList.add("text-white");
               elem.classList.add("text-center");

               if(javitaskell)
               {
                    if(e!=helyesvalasz[index])
                    {
                        elem.classList.add("bg-danger")
                        

                        
                    }
               }

               switch(e)
               {
                case "A":
                    elem.classList.add("bg-primary")
                    break
                case "B":
                    elem.classList.add("bg-info")
                    break
                case "C":
                    elem.classList.add("bg-warning")
                    break
                case "D":
                    elem.classList.add("bg-success")
                    break
                case "X":
                    elem.classList.add("bg-secondary")
                    break
               }
               elem.innerHTML= e;
               
               gyujto.appendChild(elem);


            });
            return gyujto;
        }

        function f5()
        {
            const feladatszam=parseInt(document.getElementById("feladatsorszam").value)-1;

            const szurt= adatok.filter(x => x.valaszok[feladatszam]==helyesvalasz[feladatszam]);

            document.getElementById("helyesfo").innerHTML=szurt.length;
            document.getElementById("szazalek").innerHTML=((szurt.length/adatok.length)*100).toFixed(2);
        }

        function f6()
        {
            /*irasd ki ugy hogy egy listában jelenjen meg amit lehet görgetni, hogy kisebb helyen elférjen, tördelt a listát, egymás alatt legyenek az eredmények*/

           

            let eredmenyek=[];
            adatok.forEach(versenyzo => {
                let pontszam=0;
                versenyzo.valaszok.split("").forEach((valasz,index) => {
                    if(valasz==helyesvalasz[index])
                    {
                        if(index<5)
                        {
                            pontszam+=3;
                        }
                        else if(index<10)
                        {
                            pontszam+=4;
                        }
                        else if(index<13)
                        {
                            pontszam+=5;
                        }
                        else
                        {
                            pontszam+=6;
                        }
                    }
                });
                eredmenyek.push({kod:versenyzo.kod,pontszam:pontszam});
            });
            console.log(eredmenyek);

             let szoveg="";
             eredmenyek.forEach(x => {
                szoveg+=x.kod+" "+x.pontszam+"\n";
             });

             const blob = new Blob([szoveg], {type: "text/plain"});
             const url = URL.createObjectURL(blob);
             const a = document.createElement("a");
             a.href = url;
             a.download = "pontok.txt";
             a.click();
             URL.revokeObjectURL(url);
             /*tördelt a listát, egymás alatt legyenek az eredmények*/
             document.getElementById("eredmenyLista").innerHTML="Azonosító(k) és Pontszám(ok)\n <br>"+szoveg.replace(/\n/g, "<br>");
            document.getElementById("eredmenyLista").innerHTML+=szoveg.replace(/\n/g, "<br>");
            document.getElementById("eredmenyLista").style.display = "block";


        }
        
        
    </script>
</body>
</html>
