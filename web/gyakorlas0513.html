<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


    <style>
        .valaszjelolo
        {
            height: 25px;
            width: 25px;
            box-sizing: content-box;
        }
    </style>


</head>
<body onload="betolt()">
    <div class="container">
        <div class="row">
            <header class="col-12"><h1 class="text-center">Tesztverseny</h1></header>
        </div>
        <div class="row">
            <div class="col-6">
                <h2 class="text-primary ">2.Feladat:</h2>
                <p>A vetélkedőn <span class="text-success fw-bold" id="f2"></span> versenyző indult.</p>
            </div>
            <div class="col-6">
                <h2 class="text-primary">3.Feladat:</h2>
                <label for="f3">A versenyző azonosítója: </label>
                <input type="text" class="form-control" value="AB123" id="azonosito">
                <div class="text-center p-3 "><button onclick="f3()" class="btn btn-info">lekérés</button></div>
                <h3>A versenyző válaszai:</h3>
                <div id="eredmeny" class="border"></div>
                <h3>A helyes megoldás:</h3>
                <div id="helyes" class="border"></div>
            </div>
             <div class="col-6">
                <h2 class="text-primary">4.Feladat:</h2>
                <label for="f3">A feladat sorszáma: </label>
                <input type="number" min="1" max="14" value="10" class="form-control" id="feladatsorszam">
                <div class="text-center p-3 "><button onclick="f5()" class="btn btn-info">lekérés</button></div>
                <h3>A versenyző válaszai:</h3>
                <div id="eredmeny5" class="border">
                    <p>A feladatra <span></span> fő, a versenyzők <span></span>%-a adott helyes választ. </p>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-3">
                <p>4.feladat:</p> 
                <button onclick="f4()" type="button" class="btn" ></button>
            </div>
        </div>
    </div>

    <script>
        let adatok=[];
        let helyesvalasz="";
        function betolt()
        {

            fetch("valaszok.txt")
            .then(x=>x.text())
            .then(y=>{

                adatok=y.replaceAll("\r","").trim().split("\n");
                helyesvalasz=adatok.shift();
                //console.log(adatok);

                adatok=adatok.map(x=>{

                    const vag =x.split(" ");
                    return{kod:vag[0],valaszok:vag[1]}

                })
                console.log(adatok);
                f2()

            })
            
        }


        function f2()
        {
            let eredmeny=adatok.length
            document.getElementById("f2").innerHTML=eredmeny;
        }
        
        function f3()
        {
            //console.log("hallo")

            const kod=document.getElementById("azonosito").value.toUpperCase();
            let versenyzoadat = adatok.filter(x=>x.kod==kod);
            console.log(versenyzoadat)

            if(versenyzoadat.length==0)
            {
                alert("nem érvényes kód")
                document.getElementById("azonosito").value="";
                return;
            }
            document.getElementById("eredmeny").innerHTML = "" 
            document.getElementById("eredmeny").appendChild(valaszmegjelenit(versenyzoadat[0].valaszok,true));

            document.getElementById("helyes").innerHTML = "" 
            document.getElementById("helyes").appendChild(valaszmegjelenit(helyesvalasz));


        }
        
        function valaszmegjelenit(valaszok,javitaskell=false)
        {



            let gyujto=document.createElement("div");
            console.log(valaszok);

            valaszok.split("").forEach((e,index) => {
               let elem = document.createElement("div");
               elem.classList.add("valaszjelolo");
               elem.classList.add("d-inline-block");
               elem.classList.add("text-white");
               elem.classList.add("text-center");

               if(javitaskell)
               {
                    if(e!=helyesvalasz[index])
                    {
                        elem.classList.add("bg-danger")
                        

                        
                    }
               }

               switch(e)
               {
                case "A":
                    elem.classList.add("bg-primary")
                    break
                case "B":
                    elem.classList.add("bg-info")
                    break
                case "C":
                    elem.classList.add("bg-warning")
                    break
                case "D":
                    elem.classList.add("bg-success")
                    break
                case "X":
                    elem.classList.add("bg-secondary")
                    break
               }
               elem.innerHTML= e;
               
               gyujto.appendChild(elem);


            });
            return gyujto;
        }

        function f5()
        {
            const feladatszam=parseInt(document.getElementById("feladatsorszam").value)-1;

           const szurt= adatok.filter(x => x.valaszok[feladatszam]==helyesvalasz[feladatszam])


        }
        
        
    </script>
</body>
</html>
